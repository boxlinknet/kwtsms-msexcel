<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=Edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>kwtSMS</title>

    <!-- Office JavaScript API -->
    <script type="text/javascript" src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js"></script>

    <link href="taskpane.css" rel="stylesheet" type="text/css" />
</head>

<body>

    <!-- Login Section (visible by default) -->
    <section id="login-section">
        <div class="login-logo">
            <img src="../../assets/kwtsms-logo.png" alt="kwtSMS" style="max-width: 180px; height: auto;" />
        </div>
        <h1 class="login-heading">Login to kwtSMS API</h1>

        <form id="login-form">
            <div class="form-group">
                <label for="username" class="form-label">API Username</label>
                <input type="text" id="username" class="form-input" placeholder="Enter API username" autocomplete="username" />
            </div>

            <div class="form-group">
                <label for="password" class="form-label">API Password</label>
                <input type="password" id="password" class="form-input" placeholder="Enter API password" autocomplete="current-password" />
            </div>

            <button id="login-btn" type="submit" class="btn btn-primary btn-block">Login</button>

            <div id="login-error" class="error-msg" style="display:none;"></div>
        </form>
    </section>

    <!-- Main Section (hidden by default) -->
    <section id="main-section" style="display:none;">

        <!-- Logo -->
        <div class="main-logo">
            <img src="../../assets/kwtsms-logo.png" alt="kwtSMS" style="max-width: 150px; height: auto;" />
        </div>

        <!-- Balance + logout -->
        <div class="balance-bar">
            <div class="balance-left">
                <span class="balance-label">Balance:</span>
                <span id="balance-value" class="balance-value">--</span>
            </div>
            <button id="refresh-account-btn" class="btn btn-outline btn-sm" title="Refresh balance, sender IDs, coverage">&#8635;</button>
            <button id="logout-btn" class="btn btn-outline btn-sm">Logout</button>
        </div>

        <div class="divider"></div>

        <!-- Sender ID + Test mode -->
        <div class="form-row">
            <div class="form-group flex-1">
                <label for="sender-id-select" class="form-label">Sender ID</label>
                <select id="sender-id-select" class="form-select"></select>
            </div>
            <div class="form-group test-mode-group">
                <label class="form-label">Test Mode</label>
                <label class="toggle-label">
                    <input type="checkbox" id="test-mode-toggle" class="toggle-input" />
                    <span class="toggle-track"></span>
                </label>
            </div>
        </div>

        <!-- Country code (populated from /coverage/ API) -->
        <div class="form-group">
            <label for="country-code" class="form-label">Default Country Code</label>
            <select id="country-code" class="form-select"></select>
        </div>

        <div class="divider"></div>

        <!-- Column selectors -->
        <div class="form-row">
            <div class="form-group flex-1">
                <label for="phone-column" class="form-label">Phone Column</label>
                <select id="phone-column" class="form-select">
                    <option value="">-- Select --</option>
                </select>
            </div>
            <div class="form-group align-end">
                <button id="refresh-columns-btn" class="btn btn-outline btn-sm" title="Refresh columns">&#8635;</button>
            </div>
        </div>

        <div class="form-group">
            <label for="message-column" class="form-label">Message Column</label>
            <select id="message-column" class="form-select">
                <option value="">-- Select --</option>
            </select>
        </div>

        <div class="divider"></div>

        <!-- Message template -->
        <div class="form-group">
            <label for="message-template" class="form-label">Message Template</label>
            <textarea id="message-template" class="form-textarea" rows="4" placeholder="Hello {Name}, your order #{OrderID} is ready for pickup at {Address}. Use {ColumnName} or {A} for column substitution."></textarea>
        </div>

        <!-- Send preview -->
        <div id="send-preview" class="preview-box" style="display:none;">
            <div class="preview-row">
                <span class="preview-label">Total rows:</span>
                <span id="preview-total" class="preview-value">0</span>
            </div>
            <div class="preview-row">
                <span class="preview-label">Valid:</span>
                <span id="preview-valid" class="preview-value preview-valid">0</span>
            </div>
            <div class="preview-row">
                <span class="preview-label">Invalid:</span>
                <span id="preview-invalid" class="preview-value preview-warn">0</span>
            </div>
            <div class="preview-row">
                <span class="preview-label">Duplicates:</span>
                <span id="preview-duplicates" class="preview-value preview-warn">0</span>
            </div>
            <div class="preview-row">
                <span class="preview-label">No coverage:</span>
                <span id="preview-skipped" class="preview-value preview-warn">0</span>
            </div>
            <div class="preview-row">
                <span class="preview-label">Empty messages:</span>
                <span id="preview-empty-msgs" class="preview-value preview-warn">0</span>
            </div>
        </div>

        <!-- Send button -->
        <button id="send-btn" class="btn btn-primary btn-block">Send SMS</button>

        <!-- Progress bar (hidden until sending) -->
        <div id="send-progress" class="progress-container" style="display:none;">
            <div class="progress-text">
                <span id="progress-label">Sending...</span>
                <span id="progress-count">0 / 0</span>
            </div>
            <div class="progress-bar-track">
                <div id="progress-bar-fill" class="progress-bar-fill" style="width:0%"></div>
            </div>
        </div>

        <!-- Result / error -->
        <div id="send-result" class="result-msg" style="display:none;"></div>
        <div id="send-error" class="error-msg" style="display:none;"></div>

        <!-- Footer -->
        <footer class="footer">
            <a href="https://kwtsms.com" target="_blank" class="footer-link">kwtsms.com</a>
            <span id="version-display" class="version-text"></span>
        </footer>

    </section>

</body>

</html>
